# Configuration for the WitMotion WTGPS-300 (TTL) ROS 2 driver.
# Load with: ros2 run rom_wit_wtgps_300 wit_gps_300_ttl \
#              --ros-args --params-file <path>/witgps.yaml
wit_gps_300_ttl:
  ros__parameters:
    # --- Serial port -------------------------------------------------------
    port: /dev/ttyUSB0        # TTL serial device
    baudrate: 115200          # WTGPS-300 default on this unit (verified via raw read)
    frame_id: gps             # frame_id stamped on every published message

    # --- Output topic names ------------------------------------------------
    fix_topic: gps/fix                  # sensor_msgs/NavSatFix
    vel_topic: gps/vel                  # geometry_msgs/TwistStamped (ENU)
    time_ref_topic: gps/time_reference  # sensor_msgs/TimeReference
    status_topic: gps/status            # rom_wit_wtgps_300/WitGpsStatus (DOP + satellites)

    # --- Protocol / parsing options ---------------------------------------
    time_ref_source: gps      # 'source' string stamped on TimeReference messages
    strict_checksum: true     # reject NMEA sentences without a valid checksum
    use_vtg_velocity: true    # true: velocity from VTG; false: velocity from RMC
    horizontal_accuracy: 2.5  # metres; per-axis sigma used with HDOP for covariance

    # --- Satellite systems reported in NavSatFix.status.service -----------
    service_gps: true         # WTGPS-300 tracks GPS
    service_beidou: true      # WTGPS-300 tracks BeiDou (COMPASS)
